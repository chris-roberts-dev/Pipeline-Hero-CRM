# ---------------------------------------------------------------------------
# Local dev reverse proxy for MyPipelineHero.
#
# Handles both:
#   - http://mypipelinehero.localhost           (root domain — login landing page)
#   - http://{slug}.mypipelinehero.localhost    (tenant portal)
#
# Browsers (Chrome/Firefox) auto-resolve *.localhost to 127.0.0.1 per RFC 6761,
# so no /etc/hosts edits are needed for those. Safari does NOT — Safari users
# must add explicit entries; see README §Setup.
#
# This config is dev-only. Production routing is handled by your cloud
# ingress/load balancer and is out of scope here.
# ---------------------------------------------------------------------------

upstream django {
    server django:8000;
}

# Root domain + any subdomain. The catch-all server_name lets nginx accept
# whatever subdomain the browser sends, and Django's TenancyMiddleware (added
# in M1-late) inspects the Host header to resolve the tenant.
server {
    listen 80;
    server_name mypipelinehero.localhost *.mypipelinehero.localhost;

    # Max upload size. Quote/invoice PDFs and completion photos are the
    # expected payloads; 25M is comfortably above typical attachments.
    client_max_body_size 25M;

    # Static files — served directly by nginx in prod; in dev we proxy so
    # runserver's staticfiles handling works. Switches when we add a
    # collectstatic volume in M6.
    location /static/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://django;

        # Preserve the original Host header so Django sees
        # `{slug}.mypipelinehero.localhost`, not `django:8000`. This is
        # how TenancyMiddleware will resolve the active organization.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-polling / SSE headers, harmless for regular requests.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
