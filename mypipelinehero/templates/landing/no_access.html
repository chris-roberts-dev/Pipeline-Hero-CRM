{% extends "base.html" %}
{% block title %}No access · MyPipelineHero{% endblock %}

{% block content %}
<div class="container">
    <div class="card auth-card shadow-sm">
        <div class="card-body p-4 text-center">
            <h1 class="brand h4 mb-3">No access</h1>
            <p class="text-muted">
                Your account is authenticated, but you are not a member of any active organization.
            </p>
            <p class="text-muted small">
                Contact your organization administrator if you believe this is an error.
            </p>
            <a href="{% url 'landing:logout' %}" class="btn btn-outline-secondary mt-3">Sign out</a>
        </div>
    </div>
</div>
{% endblock %}
