{% extends "base.html" %}
{% block title %}Sign-in failed · MyPipelineHero{% endblock %}

{% block content %}
<div class="container">
    <div class="card auth-card shadow-sm">
        <div class="card-body p-4 text-center">
            <h1 class="brand h4 mb-3">Sign-in could not be completed</h1>
            <p class="text-muted">
                The sign-in link is invalid or has expired. Please sign in again.
            </p>
            <p class="text-muted small">
                Handoff tokens are valid for 60 seconds and can be used only once.
            </p>
        </div>
    </div>
</div>
{% endblock %}
